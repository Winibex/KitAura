  <meta charset="UTF-8">

  <meta property="og:type" content="website" />

  <meta property="og:title" content="KitAura — AI-Powered CV, Cover Letter & Proposal Builder" />
  <meta property="og:description" content="Build professional CVs, cover letters, and proposals in minutes with AI. Free to start, no signup required." />
  <meta property="og:image" content="https://app-kitaura.winibex.com/icons/og-image.png" />
  <meta property="og:image:width" content="1200" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />

  <meta name="twitter:title" content="KitAura — AI-Powered CV, Cover Letter & Proposal Builder" />

  <meta name="twitter:image" content="https://app-kitaura.winibex.com/icons/og-image.png" />
  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">

  <link rel="icon" type="image/png" href="favicon.png"/>

  <link rel="manifest" href="manifest.json">

<body>
<!-- Loading screen while Flutter initializes -->
<div id="splash" style="
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #0F172A;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    transition: opacity 0.4s ease;
  ">
  <div style="
      color: white;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 32px;
      font-weight: 800;
      letter-spacing: 6px;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.2s;
    ">KITAURA</div>
  <div style="
      color: #76818E;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      font-style: italic;
      margin-top: 10px;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.5s;
    ">Your career, beautifully crafted.</div>
  <div style="
      margin-top: 48px;
      width: 48px;
      height: 3px;
      border-radius: 2px;
      background: rgba(207, 77, 111, 0.2);
      overflow: hidden;
      opacity: 0;
      animation: fadeUp 0.4s ease forwards 0.8s;
    ">
    <div style="
        width: 100%;
        height: 100%;
        background: #CF4D6F;
        border-radius: 2px;
        animation: loadSlide 1.2s ease-in-out infinite;
        transform-origin: left;
      "></div>
  </div>
</div>
<style>
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes loadSlide {
    0% { transform: translateX(-100%); }
    50% { transform: translateX(0%); }
    100% { transform: translateX(100%); }
  }
</style>

<script>
  var __splashRemoved = false;
  window.removeSplash = function () {
    if (__splashRemoved) return;
    __splashRemoved = true;
    var splash = document.getElementById('splash');
    if (!splash) return;
    splash.style.opacity = '0';
    setTimeout(function () {
      splash.parentNode && splash.parentNode.removeChild(splash);
    }, 400);
  };
  window.addEventListener('flutter-first-frame', function () {
    window.removeSplash();
  });
</script>

<!--
  Cache Management
  Flutter Web outputs fixed-name files (flutter_bootstrap.js, main.dart.js)
  that change every build. firebase.json sets these to "no-cache" (cache but
  always revalidate via ETag). Fonts and images stay immutable.

  Problem: existing users may have old versions cached with "immutable" headers
  from a previous misconfiguration. The fetch() with cache:'reload' below
  bypasses the old immutable entry and updates the browser cache with the
  server's current response (which now has "no-cache" headers).
  This runs once per CACHE_VER bump, controlled by localStorage.
-->
<script>
  (function () {
    // Service worker cleanup (belt and suspenders)
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (regs) {
        regs.forEach(function (r) { r.unregister(); });
      });
      if ('caches' in window) {
        caches.keys().then(function (names) {
          names.forEach(function (n) { caches.delete(n); });
        });
      }
    }

    // --- Cache-bust + Flutter loader ---
    var CACHE_VER = '1';
    var isStale = false;
    try { isStale = localStorage.getItem('kitaura_cv') !== CACHE_VER; } catch(e) {}

    function loadFlutter() {
      var s = document.createElement('script');
      s.src = 'flutter_bootstrap.js';
      s.async = true;
      document.body.appendChild(s);
    }

    if (isStale) {
      // Pre-fetch critical files with cache:'reload' to bypass old immutable
      // entries and replace them with the server's current (no-cache) response.
      // After this, Flutter loads from the updated cache — no stale content.
      Promise.all([
        fetch('flutter_bootstrap.js', { cache: 'reload' }),
        fetch('main.dart.js', { cache: 'reload' })
      ]).then(function () {
        try { localStorage.setItem('kitaura_cv', CACHE_VER); } catch(e) {}
        loadFlutter();
      }).catch(function () {
        // Network error — load Flutter anyway (uses whatever cache has)
        try { localStorage.setItem('kitaura_cv', CACHE_VER); } catch(e) {}
        loadFlutter();
      });
    } else {
      loadFlutter();
    }
  })();
</script>
</body>
</html>
