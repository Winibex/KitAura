<body>
<!-- Loading screen while Flutter initializes -->
<div id="splash" style="
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #0F172A;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    transition: opacity 0.4s ease;
  ">
  <!-- Animated SVG wordmark instead of pixelated PNG -->
  <div style="
      color: white;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 32px;
      font-weight: 800;
      letter-spacing: 6px;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.2s;
    ">KITAURA</div>
  <div style="
      color: #76818E;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      font-style: italic;
      margin-top: 10px;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.5s;
    ">Your career, beautifully crafted.</div>
  <!-- Loading bar -->
  <div style="
      margin-top: 48px;
      width: 48px;
      height: 3px;
      border-radius: 2px;
      background: rgba(207, 77, 111, 0.2);
      overflow: hidden;
      opacity: 0;
      animation: fadeUp 0.4s ease forwards 0.8s;
    ">
    <div style="
        width: 100%;
        height: 100%;
        background: #CF4D6F;
        border-radius: 2px;
        animation: loadSlide 1.2s ease-in-out infinite;
        transform-origin: left;
      "></div>
  </div>
</div>
<style>
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes loadSlide {
    0% { transform: translateX(-100%); }
    50% { transform: translateX(0%); }
    100% { transform: translateX(100%); }
  }
</style>
<script>
  var __splashRemoved = false;
  // Central splash removal. Idempotent.
  window.removeSplash = function () {
    if (__splashRemoved) return;
    __splashRemoved = true;
    var splash = document.getElementById('splash');
    if (!splash) return;
    splash.style.opacity = '0';
    setTimeout(function () {
      splash.parentNode && splash.parentNode.removeChild(splash);
    }, 400);
  };
  // Safety net: dismiss the splash the moment Flutter renders its first
  // frame, even if the Dart-side logic hasn't called removeSplash() yet.
  // This event fires from the Flutter engine itself.
  window.addEventListener('flutter-first-frame', function () {
    window.removeSplash();
  });
</script>

<!--
  Service Worker Cleanup
  KitAura is always-online (Firebase, AI, Firestore) — no offline value.
  Firebase Hosting cache headers handle versioning:
    index.html              → no-cache (always fresh on every visit)
    hashed .js/.css/fonts   → 1-year immutable (new build = new hash = new URL)
  The old SW intercepted fetches and served stale cached content, bypassing
  these headers. This block unregisters it + clears its caches.
  The deployment pipeline also ships a self-destructing flutter_service_worker.js
  so existing users' browsers pick up the "update" and auto-clean.
-->
<script>
  (function () {
    if (!('serviceWorker' in navigator)) return;

    // Unregister all service workers from the main thread
    navigator.serviceWorker.getRegistrations().then(function (regs) {
      regs.forEach(function (r) { r.unregister(); });
    });

    // Clear all SW caches (flutter_assets, fonts, etc.)
    if ('caches' in window) {
      caches.keys().then(function (names) {
        names.forEach(function (n) { caches.delete(n); });
      });
    }

    // One-time auto-reload when the self-destructing SW takes control.
    // This transitions existing users from SW-cached to header-cached content.
    // After the SW unregisters itself, this listener becomes a permanent no-op.
    var _reloading = false;
    navigator.serviceWorker.addEventListener('controllerchange', function () {
      if (!_reloading) {
        _reloading = true;
        window.location.reload();
      }
    });
  })();
</script>

<script src="flutter_bootstrap.js" async></script>
</body>
</html>
