<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="kitaura">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>kitaura</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
<!-- Loading screen while Flutter initializes -->
<div id="loading" style="
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #0F172A;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    transition: opacity 0.4s ease;
  ">

  <!-- Animated SVG wordmark instead of pixelated PNG -->
  <div style="
      color: white;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 32px;
      font-weight: 800;
      letter-spacing: 6px;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.2s;
    ">KITAURA</div>

  <div style="
      color: #76818E;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      font-style: italic;
      margin-top: 10px;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.5s;
    ">Your career, beautifully crafted.</div>

  <!-- Loading bar -->
  <div style="
      margin-top: 48px;
      width: 48px;
      height: 3px;
      border-radius: 2px;
      background: rgba(207, 77, 111, 0.2);
      overflow: hidden;
      opacity: 0;
      animation: fadeUp 0.4s ease forwards 0.8s;
    ">
    <div style="
        width: 100%;
        height: 100%;
        background: #CF4D6F;
        border-radius: 2px;
        animation: loadSlide 1.2s ease-in-out infinite;
        transform-origin: left;
      "></div>
  </div>
</div>

<style>
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes loadSlide {
    0% { transform: translateX(-100%); }
    50% { transform: translateX(0%); }
    100% { transform: translateX(100%); }
  }
</style>

<script>
  window.removeSplash = function() {
    var loading = document.getElementById('loading');
    if (loading) {
      loading.style.opacity = '0';
      setTimeout(function() { loading.remove(); }, 400);
    }
  };
</script>

<script src="flutter_bootstrap.js" async></script>
</body>
</html>
