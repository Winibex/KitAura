name: Build and Deploy Flutter Web to Firebase Hosting

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze
        continue-on-error: true

      - name: Build Flutter Web (optimized release, no service worker)
        run: |
          flutter build web \
            --release \
            --base-href "/" \
            --tree-shake-icons \
            --source-maps \
            --pwa-strategy none

      # Existing users have the old SW registered at this URL.
      # Their browser periodically checks it for updates.
      # This self-destructing version: skipWaiting → clears caches → unregisters itself.
      # After one visit, the SW is gone forever and cache headers take over.
      - name: Add self-destructing service worker (cleans up old installations)
        run: |
          cat > build/web/flutter_service_worker.js << 'EOSW'
          'use strict';
          // Self-destructing service worker.
          // Replaces the old Flutter SW so existing browsers detect the "update",
          // install this version, which immediately clears all caches and
          // unregisters itself. One-time transition to header-only caching.
          self.addEventListener('install', function() {
            self.skipWaiting();
          });
          self.addEventListener('activate', function(event) {
            event.waitUntil(
              caches.keys()
                .then(function(names) {
                  return Promise.all(names.map(function(n) { return caches.delete(n); }));
                })
                .then(function() {
                  return self.registration.unregister();
                })
            );
          });
          // Pass through all fetches to the network (no caching).
          self.addEventListener('fetch', function(event) {
            event.respondWith(fetch(event.request));
          });
          EOSW

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: kitaura-app