name: Build and Deploy Flutter Web to Hostinger

on:
  push:
    branches: [ main ]   # change if your default branch is different
  workflow_dispatch:      # allows manual trigger

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.0'
          channel: 'stable'
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze
        continue-on-error: true

      - name: Build Flutter Web (optimized release)
        run: |
          flutter build web \
            --release \
            --base-href "/" \
            --pwa-strategy none \
            --tree-shake-icons \
            --source-maps

      - name: Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          protocol: ftps
          port: 21
          local-dir: ./build/web/
          dangerous-clean-slate: false
          timeout: 60000

      # ── FLUSH HOSTINGER CDN CACHE AFTER DEPLOY ────────────────────────────────
      # This ensures every deployment is immediately visible across all browsers
      # and CDN edge nodes — no more stale version mismatches.
      - name: Flush Hostinger CDN Cache
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/cdn_response.txt -w "%{http_code}" \
            -X POST "https://api.hostinger.com/v1/cdn/flush" \
            -H "Authorization: Bearer ${{ secrets.HOSTINGER_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"domain": "kitaura.winibex.com"}')
          echo "CDN Flush HTTP Status: $HTTP_STATUS"
          cat /tmp/cdn_response.txt
          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "✅ CDN cache flushed successfully"
          else
            echo "⚠️  CDN flush returned status $HTTP_STATUS — check token or endpoint"
            exit 1
          fi